AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  SuggestExtensions: false

Metrics/BlockLength:
  AllowedMethods:
    - describe
    - context
    - it
    - shared_examples
    - shared_context
  Exclude:
    - 'spec/**/*'

Metrics/ClassLength:
  Max: 250

Metrics/MethodLength:
  Max: 40

Metrics/AbcSize:
  Max: 50

Metrics/CyclomaticComplexity:
  Max: 15

Metrics/PerceivedComplexity:
  Max: 15

Metrics/ParameterLists:
  Max: 8

Layout/LineLength:
  Max: 120
  Exclude:
    - 'spec/**/*'
